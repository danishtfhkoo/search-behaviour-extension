<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" fill="url(#grad)" rx="24"/>
  
  <!-- Clipboard icon -->
  <g transform="translate(32, 24)">
    <!-- Clipboard board -->
    <rect x="8" y="12" width="48" height="68" rx="4" fill="none" stroke="white" stroke-width="4"/>
    
    <!-- Clipboard top -->
    <rect x="20" y="8" width="24" height="8" rx="2" fill="white"/>
    
    <!-- Checkmark -->
    <path d="M 24 48 L 32 56 L 48 36" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
